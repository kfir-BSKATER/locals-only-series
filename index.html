<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LOCALS ONLY SERIES · BeSkater</title>

  <!-- Same font stack as the games -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       LOCALS ONLY SERIES — HUB PAGE
       Design tokens mirror the game exactly:
         --bg          #0c0913  (deep near-black purple)
         --panel       #16101f  (card background)
         --ink         #f3efff  (body text)
         --dim         #8d83a6  (muted text)
         --brand-amber #e6a925  (orange-peach — primary accent)
         --brand-purple #4e54a3 (deep purple — secondary accent)
       Fonts: 'Arial Black' for display, 'Space Grotesk' for body
       ============================================================ */

    :root {
      --bg:            #0c0913;
      --panel:         #16101f;
      --ink:           #f3efff;
      --dim:           #8d83a6;
      --brand-amber:   #e6a925;
      --brand-purple:  #4e54a3;
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      overscroll-behavior: none;
    }

    /* ── PAGE LAYOUT ─────────────────────────────────────────── */
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 6vw, 64px) clamp(16px, 5vw, 48px);
      gap: clamp(32px, 6vh, 56px);

      /* Subtle radial glow from top — same feel as the game overlays */
      background:
        radial-gradient(ellipse 80% 45% at 50% -5%, rgba(78,84,163,.22) 0%, transparent 70%),
        var(--bg);
    }

    /* ── HEADER: LOGO + SERIES TITLE ─────────────────────────── */
    .hub-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2.5vh, 22px);
      text-align: center;
    }

    /* BeSkater logo — transparent PNG, replace logo.png in root folder */
    .logo-wrap {
      width: clamp(160px, 38vw, 250px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(230,169,37,.35));
    }

    /* "LOCALS ONLY SERIES" — same family + shadow as .title in the game */
    .series-kicker {
      font-size: clamp(9px, 1.4vw, 11px);
      letter-spacing: .48em;
      color: var(--brand-purple);
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }
    .series-title {
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(26px, 7.5vw, 56px);
      line-height: 1.0;
      color: var(--brand-amber);
      text-shadow:
        0 0 32px rgba(230,169,37,.28),
        3px 3px 0 var(--brand-purple);
      letter-spacing: .02em;
    }
    .series-sub {
      font-size: clamp(10px, 2.2vw, 13px);
      color: var(--dim);
      letter-spacing: .12em;
      font-weight: 500;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── GAME BANNERS GRID ───────────────────────────────────── */
    .games-grid {
      display: grid;
      gap: clamp(16px, 3vw, 28px);
      width: 100%;
      max-width: 860px;

      /* Mobile: stacked. Desktop (≥640px): side by side */
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
      .games-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── SINGLE GAME BANNER ──────────────────────────────────── */
    .game-card {
      display: block;               /* <a> as block */
      text-decoration: none;
      color: var(--ink);
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid rgba(78,84,163,.4);
      background: var(--panel);
      cursor: pointer;
      transition:
        transform .18s cubic-bezier(.22,1,.36,1),
        border-color .18s,
        box-shadow .18s;

      /* Minimum tap area comfortable on mobile */
      min-height: clamp(180px, 34vw, 260px);
    }

    /* ── BANNER BACKGROUND IMAGE ─────────────────────────────
       Replace the background-image value below for each card
       with the actual artwork you design. The image goes in the
       same folder as this file. Format:
           background-image: url('game1/preview.jpg');
       The dark overlay gradient is kept so the text stays readable
       regardless of the background image content.
    ─────────────────────────────────────────────────────────── */
    .game-card--1 {
      /* 🎨 REPLACE: background-image: url('game1/preview.jpg'); */
      background-image: none;
    }
    .game-card--2 {
      /* 🎨 REPLACE: background-image: url('game2/preview.jpg'); */
      background-image: none;
    }
    .game-card {
      background-size: cover;
      background-position: center;
    }

    /* Dark scrim so text is always legible over any background image */
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(12,9,19,.72) 0%,
        rgba(12,9,19,.54) 50%,
        rgba(12,9,19,.82) 100%
      );
      transition: background .18s;
      z-index: 0;
    }

    /* Hover state — amber glow + slight lift */
    .game-card:hover,
    .game-card:focus-visible {
      transform: translateY(-4px) scale(1.012);
      border-color: var(--brand-amber);
      box-shadow:
        0 0 32px rgba(230,169,37,.28),
        0 12px 32px rgba(0,0,0,.55);
      outline: none;
    }
    .game-card:hover::before {
      background: linear-gradient(
        160deg,
        rgba(12,9,19,.55) 0%,
        rgba(12,9,19,.36) 50%,
        rgba(12,9,19,.72) 100%
      );
    }

    /* Active / tap feedback */
    .game-card:active {
      transform: translateY(1px) scale(.995);
      box-shadow: 0 0 24px rgba(230,169,37,.2), 0 4px 12px rgba(0,0,0,.5);
    }

    /* Banner inner content */
    .game-card__inner {
      position: relative;
      z-index: 1;
      height: 100%;
      min-height: inherit;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(16px, 3vw, 24px);
      gap: 6px;
    }

    /* "GAME 1" / "GAME 2" label — same .kicker style */
    .game-card__eyebrow {
      font-size: clamp(8px, 1.2vw, 10px);
      letter-spacing: .44em;
      color: var(--brand-purple);
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }

    /* Game title — .title style */
    .game-card__title {
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 900;
      font-size: clamp(18px, 4.5vw, 30px);
      line-height: 1.05;
      color: var(--brand-amber);
      text-shadow:
        0 0 20px rgba(230,169,37,.35),
        2px 2px 0 var(--brand-purple);
    }

    /* Short descriptor — .rules style */
    .game-card__desc {
      font-size: clamp(10px, 1.8vw, 12px);
      color: rgba(243,239,255,.72);
      font-weight: 500;
      line-height: 1.4;
      max-width: 26ch;
    }

    /* CTA tag — pill */
    .game-card__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      background: var(--brand-amber);
      color: #1a1206;
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(10px, 1.6vw, 12px);
      font-weight: 900;
      letter-spacing: .06em;
      border-radius: 99px;
      padding: 6px 14px;
      width: fit-content;
      box-shadow: 0 0 16px rgba(230,169,37,.45), 0 3px 0 #8a651a;
      transition: box-shadow .12s, transform .1s;
    }
    .game-card:hover .game-card__cta {
      box-shadow: 0 0 28px rgba(230,169,37,.7), 0 3px 0 #8a651a;
      transform: scale(1.04);
    }

    /* ── SUB-HEADLINE (below logo, above banners) ────────────── */
    .hub-sub {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(11px, 2vw, 14px);
      font-weight: 500;
      color: var(--dim);
      letter-spacing: .06em;
      text-align: center;
      line-height: 1.5;
      opacity: .85;
      margin-top: clamp(-16px, -1.5vh, -8px); /* pulls it closer to the logo */
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .hub-footer {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: .1em;
      text-align: center;
      opacity: .7;
    }

    /* ── REDUCED MOTION ──────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .game-card { transition: none; }
      .game-card:hover { transform: none; }
    }
  </style>
</head>

<body>
<main class="page">

  <!-- ── HEADER ────────────────────────────────────────────── -->
  <header class="hub-header">

    <!-- BeSkater logo — place logo.png in the root folder.
         The logo already contains all brand text; no duplicate copy here. -->
    <div class="logo-wrap">
      <img src="logo.png" alt="BeSkater — בית הספר לסקייטבורד" draggable="false">
    </div>

  </header>

  <!-- Sub-headline: sits between logo and game banners -->
  <p class="hub-sub">סדרת המשחקים של כפיר מהאקדמיה של הסקייטבורד</p>

  <!-- ── GAME BANNERS ──────────────────────────────────────── -->
  <nav class="games-grid" aria-label="בחר משחק">

    <!-- GAME 1 -->
    <a class="game-card game-card--1" href="game1/index.html"
       aria-label="Locals Only 1 — Skatepark Cleanup">
      <div class="game-card__inner">
        <span class="game-card__eyebrow">Game 01</span>
        <h2 class="game-card__title">LOCALS ONLY 1<br>SKATEPARK CLEANUP</h2>
        <p class="game-card__desc">זרים החוצה!</p>
        <span class="game-card__cta">DROP IN ›</span>
      </div>
    </a>

    <!-- GAME 2 -->
    <a class="game-card game-card--2" href="game2/index.html"
       aria-label="Locals Only 2 — Scooter Hunter">
      <div class="game-card__inner">
        <span class="game-card__eyebrow">Game 02</span>
        <h2 class="game-card__title">LOCALS ONLY 2<br>SCOOTER HUNTER</h2>
        <p class="game-card__desc">הצלף מחזון איש & בן ציון פוגל</p>
        <span class="game-card__cta">DROP IN ›</span>
      </div>
    </a>

  </nav>

  <!-- ── FOOTER ────────────────────────────────────────────── -->
  <footer class="hub-footer">
    B Skater · סקייטפארק רחובות 🐝
  </footer>

</main>
</body>
</html>
